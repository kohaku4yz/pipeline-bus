name: Visual preview

on:
  push:
    branches:
      - feature/task-visualizer-ui
    paths:
      - "frontend/**"
      - ".github/workflows/visual-preview.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/visual-preview.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate source
        run: |
          node --check frontend/app.js
          python3 -m py_compile frontend/capture-preview.py

      - name: Show browser version
        run: google-chrome --version

      - name: Capture deterministic viewports
        run: |
          mkdir -p visual-artifacts
          python3 frontend/capture-preview.py \
            --width 1600 --height 1100 --wait-ms 4000 \
            --data ./data/visual-qa.json \
            --output visual-artifacts/pipeline-bus-desktop-1600.png
          python3 frontend/capture-preview.py \
            --width 1280 --height 1000 --wait-ms 4000 \
            --data ./data/visual-qa.json \
            --output visual-artifacts/pipeline-bus-laptop-1280.png
          python3 frontend/capture-preview.py \
            --width 390 --height 844 --wait-ms 4000 \
            --data ./data/visual-qa.json \
            --output visual-artifacts/pipeline-bus-mobile-390.png

      - name: Upload visual preview
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-bus-visual-preview
          path: visual-artifacts/*.png
          if-no-files-found: error
          retention-days: 14
